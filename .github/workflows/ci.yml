name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    env:
      # Prisma's `generate` step only reads schema.prisma — it doesn't need
      # a live database — so a placeholder URL is enough for CI. Real
      # builds/deploys run on Vercel with the actual Neon DATABASE_URL set
      # per project, which is what actually needs to connect.
      DATABASE_URL: "postgresql://user:password@localhost:5432/813bnb"
      DIRECT_URL: "postgresql://user:password@localhost:5432/813bnb"
      NEXTAUTH_SECRET: "ci-placeholder-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
