name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    env:
      # Prisma's `generate` step only reads schema.prisma — it doesn't need
      # a live database — so a placeholder URL is enough for CI. Real
      # builds/deploys run on Vercel with the actual Neon DATABASE_URL set
      # per project, which is what actually needs to connect.
      DATABASE_URL: "postgresql://user:password@localhost:5432/813bnb"
      DIRECT_URL: "postgresql://user:password@localhost:5432/813bnb"
      NEXTAUTH_SECRET: "ci-placeholder-secret"
    steps:
      - uses: actions/checkout@v4

      # No `version` input here on purpose — it reads from package.json's
      # "packageManager" field instead. Specifying both causes
      # pnpm/action-setup to fail outright with a conflicting-version error.
      - uses: pnpm/action-setup@v4

      # No cache: "pnpm" here — actions/setup-node's built-in pnpm caching
      # failed against pnpm 11.x (likely a version-detection mismatch in
      # that action, since pnpm 11 is very new). Caching is a speed
      # optimization, not a correctness requirement, so dropping it rather
      # than debugging blind against an external action's internals.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
