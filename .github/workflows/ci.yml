name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    env:
      # Prisma's `generate` step only reads schema.prisma — it doesn't need
      # a live database — so a placeholder URL is enough for CI. Real
      # builds/deploys run on Vercel with the actual Neon DATABASE_URL set
      # per project, which is what actually needs to connect.
      DATABASE_URL: "postgresql://user:password@localhost:5432/813bnb"
      DIRECT_URL: "postgresql://user:password@localhost:5432/813bnb"
      NEXTAUTH_SECRET: "ci-placeholder-secret"
    steps:
      - uses: actions/checkout@v4

      # No `version` input here on purpose — it reads from package.json's
      # "packageManager" field instead. Specifying both causes
      # pnpm/action-setup to fail outright with a conflicting-version error.
      - uses: pnpm/action-setup@v4

      # pnpm 11.x requires Node.js >= 22.13 (it uses the node:sqlite
      # built-in, only available from Node 22.5+) — this was the actual
      # root cause of CI failing outright at "Install dependencies" with
      # "Error [ERR_UNKNOWN_BUILTIN_MODULE]: No such built-in module:
      # node:sqlite" under the previous node-version: 20. It also explains
      # why actions/setup-node's pnpm caching appeared broken earlier: it
      # was hitting the same crash, not a caching bug.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
